<section class="panel">
  <h2>Course Listing</h2>

  <input
    [(ngModel)]="searchTerm"
    (ngModelChange)="onSearchChange()"
    placeholder="Search and update query param"
  />

  <p *ngIf="isLoading">Loading courses...</p>
  <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

  <ng-template #noCourses>
    <p>No courses available.</p>
  </ng-template>

  <div *ngIf="!isLoading">
    <div class="grid" *ngIf="courses.length; else noCourses">
      <app-course-card
        *ngFor="let course of courses; let i = index; trackBy: trackByCourseId"
        [course]="course"
        (enrollRequested)="onEnroll($event)"
        (click)="navigateToCourse(course.id)"
      ></app-course-card>
    </div>
  </div>

  <p *ngIf="selectedCourseId">Selected course ID: {{ selectedCourseId }}</p>
</section>
