<section class="panel">
  <h1>{{ portalName }}</h1>
  <p>Welcome to the student dashboard for courses, grades, and enrollment.</p>

  <div class="stats-row">
    <div>Courses Available: {{ coursesAvailable || 12 }}</div>
    <div>Enrolled: 3</div>
    <div>GPA: 3.8</div>
  </div>

  <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
  <p>{{ message }}</p>

  <!-- [property] is one-way binding (component -> DOM), while [(ngModel)] is two-way (DOM <-> component). -->
  <input [(ngModel)]="searchTerm" placeholder="Search course" />
  <p>Searching for: {{ searchTerm }}</p>
</section>

<app-course-summary-widget></app-course-summary-widget>
