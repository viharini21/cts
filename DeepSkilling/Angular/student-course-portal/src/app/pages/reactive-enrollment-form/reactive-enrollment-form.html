<section class="panel">
  <h2>Reactive Enrollment Form</h2>

  <form [formGroup]="enrollForm" (ngSubmit)="submit()">
    <label>
      Name
      <input formControlName="studentName" />
    </label>

    <label>
      Email
      <input formControlName="studentEmail" />
    </label>
    <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">Email taken.</span>

    <label>
      Course ID
      <input formControlName="courseId" />
    </label>
    <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']"
      >Course code starting with XX is not allowed.</span
    >

    <label>
      Semester
      <select formControlName="preferredSemester">
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </label>

    <label> <input type="checkbox" formControlName="agreeToTerms" /> Agree to terms </label>

    <button type="button" (click)="addCourse()">Add Another Course</button>

    <div *ngFor="let ctrl of additionalCourses.controls; let i = index" class="row">
      <input [formControl]="$any(ctrl)" placeholder="Additional course" />
      <button type="button" (click)="removeCourse(i)">Remove</button>
    </div>

    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
  </form>
</section>
