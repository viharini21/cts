<div class="container">

    <!-- Interpolation -->
    <h1>Welcome to {{ portalName }}</h1>

    <p class="description">
        Manage your courses, view your profile and monitor your academic progress in one place.
    </p>

    <!-- Two-Way Data Binding -->
    <div class="search-section">
        <input
            type="text"
            placeholder="Search courses..."
            [(ngModel)]="searchTerm">

        <p class="search-text">
            Searching for:
            <strong>{{ searchTerm || 'Nothing yet' }}</strong>
        </p>
    </div>

    <!-- Property Binding + Event Binding -->
    <button
        class="enroll-btn"
        [disabled]="!isPortalActive"
        (click)="onEnrollClick()">
        Enroll Now
    </button>

    <p class="message">{{ message }}</p>

    <div class="stats">

        <div class="card">
            <div class="icon">📚</div>
            <h3>Courses Available</h3>
                <div class="number">{{ courseCount }}</div>
        </div>

        <div class="card">
            <div class="icon">🎯</div>
            <h3>Enrolled</h3>
            <div class="number">3</div>
        </div>

        <div class="card">
            <div class="icon">⭐</div>
            <h3>Current GPA</h3>
            <div class="number">3.8</div>
        </div>

    </div>

</div>
