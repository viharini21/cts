<!DOCTYPE html>
<html>

<head>
    <title>CSS Inclusion Methods</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f0f8ff;
        }
    </style>

</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color:red;">
        Welcome to Community Portal
    </h1>

    <h2 class="header">
        Upcoming Events
    </h2>

    <p>
        This page demonstrates Inline, Internal and External CSS.
    </p>

</body>

</html>
