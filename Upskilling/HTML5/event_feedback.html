<!DOCTYPE html>
<html>

<head>
    <script>

        function validatePhone() {
            let phone = document.getElementById("phone").value;

            if (phone.length != 10) {
                alert("Phone number must be 10 digits");
            }
        }

        function showFee() {
            let event = document.getElementById("event").value;
            let fee = "";

            if (event == "Music") fee = "₹200";
            else if (event == "Sports") fee = "₹300";
            else fee = "₹150";

            document.getElementById("fee").innerHTML =
                "Fee: " + fee;
        }

        function submitForm() {
            alert("Feedback Submitted Successfully");
        }

        function enlarge(img) {
            img.style.width = "300px";
        }

        function countChars() {
            let count =
                document.getElementById("feedback").value.length;

            document.getElementById("charCount").innerHTML =
                count;
        }

    </script>
</head>

<body>

    Phone:
    <input type="text" id="phone" onblur="validatePhone()">

    <br><br>

    Select Event:
    <select id="event" onchange="showFee()">
        <option>Music</option>
        <option>Sports</option>
        <option>Workshop</option>
    </select>

    <p id="fee"></p>

    <img src="event.jpg" width="150" ondblclick="enlarge(this)">

    <br><br>

    <textarea id="feedback" onkeyup="countChars()">
</textarea>

    <p>Characters:
        <span id="charCount">0</span>
    </p>

    <button onclick="submitForm()">
        Submit
    </button>

</body>

</html>
