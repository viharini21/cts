<!DOCTYPE html>
<html>

<head>

    <script>

        function readyMessage() {
            document.getElementById("msg").innerHTML =
                "Video Ready To Play";
        }

        window.onbeforeunload = function () {
            return "Your form is not submitted. Leave page?";
        };

    </script>

</head>

<body>

    <video width="500" controls oncanplay="readyMessage()">

        <source src="promo.mp4" type="video/mp4">
    </video>

    <p id="msg"></p>

</body>

</html>
